services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ods
      POSTGRES_USER: ods
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_password}
    ports:
      - "7432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./demo/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ods -d ods"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-api:
    build:
      context: ./demo
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  dagster-webserver:
    build: .
    command: >
      dagster-webserver
        -h 0.0.0.0
        -p 3000
        -m demo_domain.definitions
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ods
      POSTGRES_USER: ods
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_password}
      API_BASE_URL: http://mock-api:8000
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - ./demo/demo_domain:/opt/dagster/demo_domain
    depends_on:
      postgres:
        condition: service_healthy
      mock-api:
        condition: service_healthy

volumes:
  pgdata:
